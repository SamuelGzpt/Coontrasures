server {
    listen 80;
    server_name TU_DOMINIO.COM www.TU_DOMINIO.COM;

    # Directorio donde se construyó el frontend (React)
    root /home/usuario/Coontrasures/dist; 
    index index.html;

    # Configuración para la aplicación SPA (Single Page Application)
    # Si no encuentra el archivo, redirige a index.html para que React Router maneje la ruta
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para el backend (API)
    location /api {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy para archivos subidos (Uploads)
    # Nota: Podría servirse directamente con Nginx para mejor rendimiento,
    # pero proxy_pass es más fácil de configurar inicialmente.
    location /uploads {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Configuración de caché para archivos estáticos (opcional)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
